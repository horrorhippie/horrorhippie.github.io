<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny 2 Distortion Tracker</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #121212; 
            color: #ffffff; 
            padding-top: 50px; 
            transition: background-image 1s ease-in-out; /* Smooth fade when it changes */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            /* Adds a dark overlay so text remains readable over the image */
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.7);
        }
        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .active { font-size: 3em; color: #ff4c4c; font-weight: bold; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        .timer { font-size: 1.5em; color: #ffaa00; margin-bottom: 20px; }
        .next { font-size: 1.2em; color: #aaaaaa; }
        
        /* The dynamic image element */
        #location-image {
            width: 300px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #ff4c4c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>CURRENT DISTORTION</h2>
        <!-- This image will swap dynamically -->
        <img id="location-image" src="" alt="Location Image" style="display: none;">
        
        <div id="current-location" class="active">Loading...</div>
        <div id="time-remaining" class="timer">--:--</div>
        <div id="next-location" class="next">Next up: Loading...</div>
    </div>

    <script>
        // We now store the name AND the image filename for each location
        const locations = [
            { name: "Cosmodrome", image: "https://oyster.ignimgs.com/mediawiki/apis.ign.com/destiny-2/c/c5/Cosmodrome.jpg?width=1280" },
            { name: "EDZ", image: "https://www.pcgamesn.com/wp-content/uploads/legacy/destiny_2_european_dead_zone_1.png" },
            { name: "Dreaming City", image: "https://destiny.wiki.gallery/images/thumb/4/42/Dreamingcity.png/1200px-Dreamingcity.png" },
            { name: "Savathun's Throne World", image: "https://d1lss44hh2trtw.cloudfront.net/assets/article/2022/01/11/savathuns-throne-world-trailer-teases-the-witch-queens-deadly-domain-in-destiny-2_feature.jpg" },
            { name: "Moon", image: "https://media.wired.com/photos/5d94fd76cdc4580008379aba/master/w_1600%2Cc_limit/Gear-Destiny2-Inline-D2_Moon_01.jpg" },
            { name: "Europa", image: "https://static.wikia.nocookie.net/destinypedia/images/e/e0/Europa.jpg/revision/latest?cb=20140801151636" },
            { name: "Nessus", image: "https://kseeker5.github.io/wallpapers/images/wallpapers/destiny2/Destiny%202%20-%20Nessus%201.png" }
        ];

        const referenceTime = new Date("2026-06-16T02:00:00-04:00").getTime();
        const referenceIndex = 4; // Moon

        function updateTracker() {
            const now = new Date();
            const diffMs = now.getTime() - referenceTime;
            const hoursPassed = Math.floor(diffMs / (1000 * 60 * 60));
            
            const currentIndex = (((referenceIndex + hoursPassed) % locations.length) + locations.length) % locations.length;
            const nextIndex = (currentIndex + 1) % locations.length;

            const minutes = 59 - now.getMinutes();
            const seconds = 59 - now.getSeconds();
            const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            const currentLoc = locations[currentIndex];
            const nextLoc = locations[nextIndex];

            // Update Text
            document.getElementById("current-location").innerText = currentLoc.name;
            document.getElementById("next-location").innerText = "Next up: " + nextLoc.name;
            document.getElementById("time-remaining").innerText = timeString + " remaining";

           // Update Image
            const imgElement = document.getElementById("location-image");
            
            // REMOVED the `images/` part here:
            imgElement.src = currentLoc.image; 
            imgElement.style.display = "inline-block"; 
            
            // REMOVED the `images/` part here too:
            document.body.style.backgroundImage = `url('${currentLoc.image}')`;
        }

        setInterval(updateTracker, 1000);
        updateTracker();
    </script>
</body>
</html>
